server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # Hashed assets emitted by Vite live under /assets/ — cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Static favicons / images served from public/
  location ~* \.(?:ico|png|jpg|jpeg|svg|webp|gif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Entry HTML must always be fresh so users pick up new asset hashes after deploy.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: any unknown path → index.html (React Router handles routing client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reduce signature surface
  server_tokens off;
}
